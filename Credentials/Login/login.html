<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">
        <form class="form" onsubmit="handleLogin(event)">
            <h2>Login</h2>

            <div class="field">
                <input type="text" id="email" placeholder="Email or Username" required>
                <label for="email">Email or Username</label>
                <small class="input-hint">Use your registered email or username.</small>
            </div>

            <div class="field">
                <input type="password" id="password" placeholder="Password" required>
                <label for="password">Password</label>
                <small class="input-hint">Use 8+ characters with uppercase, lowercase, number, and special character.</small>
            </div>

            <div id="error" style="color: red; display: none;"><p>Incorret password</p></div>

            <button type="submit">Login</button>

            <p>Don't have an account? <a href="../Register/register.html">Register</a></p>
            <p>Return to <a href="../../index.html">Home</a></p>

        </form>
    </div>
<script src="./login.js"></script>
</body>
</html>
